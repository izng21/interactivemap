<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floor Plan — Quality Assurance Center | PUP Maragondon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root {
    --maroon: #6b1a1a;
    --maroon-dark: #4a1010;
    --maroon-light: #8b2525;
    --gold: #c9a84c;
    --gold-light: #f0d870;
    --cream: #faf7f2;
    --surface: #ffffff;
    --text-primary: #1a1410;
    --text-secondary: #6b5f56;
    --text-muted: #a09488;
    --border: #e8e0d8;
    --nav-h: 64px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-primary);
    overflow-x: hidden;
  }

  /* ── STICKY NAV ── */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--nav-h);
    z-index: 100;
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    background: rgba(10, 2, 2, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .nav-back {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 100px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    letter-spacing: 0.2px;
    text-decoration: none;
  }

  .nav-back:hover { background: var(--maroon); border-color: var(--maroon); }
  .nav-back svg { width: 14px; height: 14px; }

  .nav-title {
    color: #fff;
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0.9;
  }

  /* ── HERO BANNER ── */
  .hero {
    position: relative;
    width: 100%;
    height: 200px;
    overflow: hidden;
    background: linear-gradient(135deg, #3a0a0a 0%, #6b1a1a 40%, #2a0808 100%);
    margin-top: var(--nav-h);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero-bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .hero-img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0.35;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(10,2,2,0.3) 0%, rgba(10,2,2,0.7) 100%);
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
  }

  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(201,168,76,0.18);
    border: 1px solid rgba(201,168,76,0.45);
    color: var(--gold-light);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 14px;
  }

  .hero-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(26px, 4vw, 42px);
    color: #fff;
    font-weight: 400;
  }

  /* ── TAB BAR ── */
  .tab-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: center;
    padding: 0 40px;
    position: sticky;
    top: var(--nav-h);
    z-index: 50;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }

  .tab-main {
    padding: 18px 32px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tab-main:hover { color: var(--text-primary); }
  .tab-main.active { color: var(--maroon); border-bottom-color: var(--maroon); }

  /* ── FLOOR TABS SUBBAR ── */
  .floor-subbar {
    background: #fdfaf7;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 14px 40px;
  }

  .floor-tab {
    padding: 9px 22px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 100px;
    border: 1.5px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    background: transparent;
  }

  .floor-tab:hover {
    color: var(--maroon);
    border-color: rgba(107, 26, 26, 0.25);
    background: rgba(107, 26, 26, 0.05);
  }

  .floor-tab.active {
    color: #fff;
    background: var(--maroon);
    border-color: var(--maroon);
  }

  /* ── MAIN VIEWER AREA ── */
  .viewer-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 40px 80px;
  }

  .viewer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .viewer-label { display: flex; align-items: center; gap: 12px; }

  .viewer-label-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--maroon-dark), var(--maroon));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .viewer-label-text h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1.2;
  }

  .viewer-label-text p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    letter-spacing: 0.3px;
  }

  /* ── FLOOR PLAN CANVAS ── */
  .fp-canvas {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    position: relative;
    min-height: 500px;
  }

  .fp-canvas-inner {
    position: relative;
    width: 100%;
    min-height: 500px;
    background: #f4ede4;
    background-image:
      linear-gradient(rgba(107,26,26,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(107,26,26,0.04) 1px, transparent 1px);
    background-size: 30px 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    transition: opacity 0.35s ease;
  }

  .fp-canvas-inner.fading { opacity: 0; }

  .fp-canvas-inner img {
    max-width: 100%;
    max-height: 520px;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    user-select: none;
    -webkit-user-select: none;
  }

  .fp-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 80px 40px;
    text-align: center;
  }

  .fp-placeholder-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, rgba(107,26,26,0.1), rgba(107,26,26,0.06));
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    border: 1.5px dashed rgba(107,26,26,0.25);
  }

  .fp-placeholder h4 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--text-primary);
    font-weight: 400;
  }

  .fp-placeholder p {
    font-size: 14px;
    color: var(--text-muted);
    max-width: 320px;
    line-height: 1.6;
  }

  .zoom-controls { display: none; }

  /* ── FLOOR LEGEND ── */
  .floor-legend {
    margin-top: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }

  .legend-title {
    font-size: 10px;
    font-weight: 800;
    color: var(--maroon);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 16px;
  }

  .legend-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .legend-item { display: flex; align-items: center; gap: 10px; }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .legend-dot.maroon { background: var(--maroon); }
  .legend-dot.gold   { background: var(--gold); }
  .legend-dot.gray   { background: #c8c0b8; }
  .legend-dot.green  { background: #5a8a6a; }
  .legend-dot.blue   { background: #4a6ea0; }
  .legend-dot.violet { background: #8e44ad; }
  .legend-dot.orange { background: #e67e22; }
  .legend-dot.teal   { background: #1a9e8a; }

  .legend-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }

  /* ── ROOM ZONES OVERLAY ── */
  .fp-floor-layer {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .fp-floor-layer img {
    display: block;
    max-width: 100%;
    max-height: 520px;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    user-select: none;
    -webkit-user-select: none;
  }

  .room-zones-wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .room-zone {
    position: absolute;
    border-radius: 4px;
    border: 2px solid rgba(255,220,100,0);
    background: rgba(255,255,200,0);
    cursor: pointer;
    pointer-events: all;
    transition: background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
  }

  .room-zone:hover {
    background: rgba(255, 235, 100, 0.28);
    border-color: rgba(255, 210, 50, 0.9);
    box-shadow: 0 0 0 3px rgba(255,210,50,0.25), inset 0 0 12px rgba(255,230,100,0.15);
    z-index: 10;
  }

  .room-zone:hover .room-pin { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }

  .room-pin {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%) translateY(4px) scale(0.88);
    background: var(--maroon);
    color: white;
    font-size: 10px;
    font-weight: 700;
    white-space: nowrap;
    padding: 3px 9px;
    border-radius: 20px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s, transform 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    z-index: 20;
  }

  .room-pin::after {
    content: '';
    position: absolute;
    bottom: -5px; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--maroon);
    border-bottom: none;
  }

  /* ── LIGHTBOX ── */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,0,0,0.97);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    animation: lbIn 0.25s ease;
  }

  .lightbox.active { display: flex; }

  @keyframes lbIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .lightbox img {
    max-width: 92vw;
    max-height: 90vh;
    border-radius: 12px;
    object-fit: contain;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }

  .lb-close {
    position: absolute;
    top: 20px; right: 20px;
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.12);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }

  .lb-close:hover { background: rgba(255,255,255,0.25); }

  .lb-label {
    position: absolute;
    bottom: 24px;
    left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.8);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 8px 20px;
    border-radius: 100px;
    backdrop-filter: blur(8px);
    white-space: nowrap;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .viewer-wrap { padding: 24px 20px 60px; }
    .viewer-header { flex-direction: column; align-items: flex-start; gap: 16px; }
    .floor-subbar { gap: 6px; padding: 12px 20px; flex-wrap: wrap; }
    .floor-tab { padding: 8px 16px; font-size: 10px; }
    .tab-bar { padding: 0 20px; }
    .fp-canvas-inner { padding: 20px; min-height: 320px; }
    .legend-grid { grid-template-columns: 1fr 1fr; }
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-up { animation: fadeUp 0.5s ease forwards; }
  .delay-1 { animation-delay: 0.1s; opacity: 0; }
  .delay-2 { animation-delay: 0.2s; opacity: 0; }
</style>
</head>
<body>

<!-- ── NAV ── -->
<nav class="nav">
  <a href="qac_detail.html" class="nav-back">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 4L6 8l4 4"/>
    </svg>
    Back to Building
  </a>
  <span class="nav-title">Quality Assurance Center — Floor Plan</span>
</nav>

<!-- ── HERO ── -->
<div class="hero">
  <div class="hero-bg-grid"></div>
  <img class="hero-img" src="images/qac.jpg" alt="Quality Assurance Center" onerror="this.style.opacity=0">
  <div class="hero-overlay"></div>
  <div class="hero-content fade-up">
    <div class="hero-eyebrow">📋 &nbsp; Quality Assurance Center</div>
    <h1 class="hero-title">Building Floor Plan</h1>
  </div>
</div>

<!-- ── TAB BAR ── -->
<div class="tab-bar">
  <a href="qac_detail.html" class="tab-main">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/>
      <rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/>
    </svg>
    Overview
  </a>
  <a href="qac_fplan.html" class="tab-main active">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="1" y="1" width="14" height="14" rx="1.5"/>
      <path d="M1 6h14M1 11h14M6 6v9M11 1v5"/>
    </svg>
    Floor Plan
  </a>
</div>

<!-- ── FLOOR SUBBAR ── -->
<div class="floor-subbar">
  <button class="floor-tab active" onclick="switchFloor(this, 1)">Ground Floor</button>
  <button class="floor-tab" onclick="switchFloor(this, 2)">2nd Floor</button>
</div>

<!-- ── VIEWER ── -->
<div class="viewer-wrap">

  <div class="viewer-header fade-up delay-1">
    <div class="viewer-label">
      <div class="viewer-label-icon">🗺️</div>
      <div class="viewer-label-text">
        <h3 id="floorTitle">Ground Floor</h3>
        <p id="floorSub">Click a room to view its photo</p>
      </div>
    </div>
  </div>

  <!-- Floor Plan Canvas -->
  <div class="fp-canvas fade-up delay-2">
    <div class="fp-canvas-inner" id="fpCanvasInner">

      <!-- Floor 1 -->
      <div id="fpLayer1" class="fp-floor-layer">
        <img src="images/qac_floor1.png" alt="Ground Floor Plan" id="fpImg1"
          onerror="this.parentNode.innerHTML=`<div class='fp-placeholder'><div class='fp-placeholder-icon'>🏗️</div><h4>Ground Floor Plan</h4><p>Floor plan image will appear here once the image file is added to the images folder.</p></div>`">
        <div class="room-zones-wrapper" id="zonesWrapper1"></div>
      </div>

      <!-- Floor 2 (hidden) -->
      <div id="fpLayer2" class="fp-floor-layer" style="display:none">
        <img src="images/qac_floor2.png" alt="2nd Floor Plan" id="fpImg2"
          onerror="this.parentNode.innerHTML=`<div class='fp-placeholder'><div class='fp-placeholder-icon'>🏗️</div><h4>2nd Floor Plan</h4><p>Floor plan image will appear here once the image file is added to the images folder.</p></div>`">
        <div class="room-zones-wrapper" id="zonesWrapper2"></div>
      </div>

    </div>
  </div>

  <!-- Room Legend -->
  <div class="floor-legend fade-up delay-2" id="floorLegend">
    <div class="legend-title">Room Legend — <span id="legendFloorLabel">Ground Floor</span></div>
    <div class="legend-grid" id="legendGrid"></div>
  </div>

</div>

<!-- ── LIGHTBOX ── -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="Floor Plan Enlarged">
  <div class="lb-label" id="lightboxLabel">Ground Floor Plan</div>
</div>

<script>
  const floors = {
    1: {
      name: 'Ground Floor',
      img: 'images/qac_floor1.png',
      rooms: [
        { color: 'maroon', label: 'Quality Assurance Office' },
        { color: 'gray',   label: 'Restrooms' },
      ],
      zones: [
        { id: 'f1r1', label: 'Quality Assurance Office',      image: 'images/qac_office.jpg',       left: 25, top: 16, width: 37, height: 50 },
      ]
    },
    2: {
      name: '2nd Floor',
      img: 'images/qac_floor2.png',
      rooms: [
        { color: 'maroon', label: 'Room' },
        { color: 'gray',   label: 'Open Space' },
      ],
      zones: [
        { id: 'f2r1', label: 'Room',        image: 'images/qac_room.jpg',       left: 25, top: 16, width: 37, height: 50 },
        
      ]
    }
  };

  let currentFloor = 1;

  function buildZones(floorNum) {
    const wrapper = document.getElementById('zonesWrapper' + floorNum);
    const img     = document.getElementById('fpImg' + floorNum);
    if (!wrapper || !img) return;

    function sizeWrapper() {
      const r = img.getBoundingClientRect();
      wrapper.style.width  = r.width  + 'px';
      wrapper.style.height = r.height + 'px';
    }

    if (img.complete && img.naturalWidth) sizeWrapper();
    else img.addEventListener('load', sizeWrapper);
    window.addEventListener('resize', sizeWrapper);

    wrapper.innerHTML = '';
    floors[floorNum].zones.forEach(zone => {
      const div = document.createElement('div');
      div.className = 'room-zone';
      div.style.left   = zone.left   + '%';
      div.style.top    = zone.top    + '%';
      div.style.width  = zone.width  + '%';
      div.style.height = zone.height + '%';
      div.innerHTML = `<div class="room-pin">${zone.label}</div>`;
      div.addEventListener('click', e => {
        e.stopPropagation();
        openLightboxWithSrc(zone.image || floors[floorNum].img, zone.label);
      });
      wrapper.appendChild(div);
    });
  }

  function switchFloor(tab, floorNum) {
    if (floorNum === currentFloor) return;
    document.querySelectorAll('.floor-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');

    const inner = document.getElementById('fpCanvasInner');
    inner.classList.add('fading');

    setTimeout(() => {
      [1, 2].forEach(f => {
        const el = document.getElementById('fpLayer' + f);
        if (el) el.style.display = 'none';
      });
      const target = document.getElementById('fpLayer' + floorNum);
      if (target) target.style.display = 'flex';

      document.getElementById('floorTitle').textContent       = floors[floorNum].name;
      document.getElementById('legendFloorLabel').textContent = floors[floorNum].name;
      updateLegend(floorNum);
      currentFloor = floorNum;
      inner.classList.remove('fading');
      setTimeout(() => buildZones(floorNum), 50);
    }, 300);
  }

  function updateLegend(floorNum) {
    document.getElementById('legendGrid').innerHTML = floors[floorNum].rooms.map(r => `
      <div class="legend-item">
        <div class="legend-dot ${r.color}"></div>
        <span class="legend-label">${r.label}</span>
      </div>
    `).join('');
  }

  function openLightboxWithSrc(src, label) {
    document.getElementById('lightboxImg').src           = src;
    document.getElementById('lightboxLabel').textContent = label;
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') {
      const next = Math.min(2, currentFloor + 1);
      if (next !== currentFloor) switchFloor(document.querySelectorAll('.floor-tab')[next - 1], next);
    }
    if (e.key === 'ArrowLeft') {
      const prev = Math.max(1, currentFloor - 1);
      if (prev !== currentFloor) switchFloor(document.querySelectorAll('.floor-tab')[prev - 1], prev);
    }
  });

  // Init
  updateLegend(1);
  window.addEventListener('load', () => buildZones(1));
  if (document.readyState === 'complete') buildZones(1);
</script>
</body>
