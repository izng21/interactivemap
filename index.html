<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUP Maragondon Campus Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a2e1a; min-height: 100vh; display: flex; flex-direction: column; }

  .header {
    background: #fff;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: relative;
    z-index: 20;
    flex-shrink: 0;
  }
  .school-logo {
    width: 46px; height: 46px; border-radius: 50%;
    background: linear-gradient(135deg, #6b1a1a, #8b2222);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 22px; flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(107,26,26,0.4);
  }
  .header-text h1 { font-size: 16px; font-weight: 700; color: #6b1a1a; line-height: 1.2; }
  .header-text p { font-size: 12px; color: #888; margin-top: 2px; }
  .header-hint {
    margin-left: auto;
    background: #fef9ec;
    border: 1px solid #f0d870;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 11px;
    color: #7a6000;
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .map-outer { flex: 1; position: relative; overflow: hidden; background: #2a3a2a; }
  .map-container { position: relative; width: 100%; padding-top: 56.25%; }
  .map-container img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; display: block; user-select: none; }

  .zone {
    position: absolute;
    border-radius: 5px;
    border: 2px solid rgba(255,220,100,0);
    background: rgba(255,255,200,0);
    cursor: pointer;
    transition: background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
  }
  .zone:hover {
    background: rgba(255, 235, 100, 0.28);
    border-color: rgba(255, 210, 50, 0.9);
    box-shadow: 0 0 0 3px rgba(255,210,50,0.25), inset 0 0 12px rgba(255,230,100,0.15);
    z-index: 10;
  }
  .zone:hover .zone-pin { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  .zone-pin {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%) translateY(4px) scale(0.88);
    background: #6b1a1a;
    color: white;
    font-size: 10px;
    font-weight: 700;
    white-space: nowrap;
    padding: 3px 9px;
    border-radius: 20px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s, transform 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    z-index: 20;
  }
  .zone-pin::after {
    content: '';
    position: absolute;
    bottom: -5px; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: #6b1a1a;
    border-bottom: none;
  }

  /* ── Mini Popup ── */
  .popup-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.42);
    z-index: 200;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .popup-overlay.active { display: flex; }
  .popup-card {
    background: #fff;
    border-radius: 22px;
    width: 360px; max-width: 100%;
    box-shadow: 0 24px 64px rgba(0,0,0,0.3);
    overflow: hidden;
    animation: popIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.82) translateY(16px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  .popup-banner {
    width: 100%; height: 120px;
    display: flex; align-items: center; justify-content: center;
    font-size: 50px;
  }
  .popup-body { padding: 16px 20px 18px; }
  .popup-tag {
    display: inline-block;
    background: #f5ece0; color: #8b3a1a;
    font-size: 10px; font-weight: 700;
    padding: 3px 10px; border-radius: 20px;
    margin-bottom: 7px;
    text-transform: uppercase; letter-spacing: 0.6px;
  }
  .popup-title { font-size: 18px; font-weight: 700; color: #1a1a1a; margin-bottom: 7px; line-height: 1.25; }
  .popup-desc {
    font-size: 12.5px; color: #555; line-height: 1.6; margin-bottom: 14px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .popup-actions { display: flex; gap: 8px; }
  .btn { flex: 1; padding: 10px 14px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s, transform 0.1s; }
  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-close { background: #f0f0f0; color: #555; flex: 0.7; }
  .btn-detail { background: #6b1a1a; color: #fff; flex: 1.3; }

  /* ── Detail Panel ── */
  .detail-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.48);
    z-index: 300;
    align-items: flex-end; justify-content: center;
  }
  .detail-overlay.active { display: flex; }
  .detail-panel {
    background: #fff;
    border-radius: 28px 28px 0 0;
    width: 100%; max-width: 680px; max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.28s cubic-bezier(0.34,1.2,0.64,1);
    scrollbar-width: thin;
  }
  @keyframes slideUp {
    from { transform: translateY(80px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .detail-banner {
    width: 100%; height: 180px;
    display: flex; align-items: center; justify-content: center;
    font-size: 68px;
    border-radius: 28px 28px 0 0;
    position: relative;
  }
  .detail-close {
    position: absolute; top: 14px; right: 14px;
    width: 34px; height: 34px;
    background: rgba(0,0,0,0.28); border: none; border-radius: 50%;
    color: #fff; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .detail-close:hover { background: rgba(0,0,0,0.5); }
  .detail-body { padding: 20px 24px 40px; }
  .detail-tag {
    display: inline-block;
    background: #f5ece0; color: #8b3a1a;
    font-size: 10px; font-weight: 700;
    padding: 4px 12px; border-radius: 20px;
    margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 0.6px;
  }
  .detail-title { font-size: 25px; font-weight: 700; color: #111; margin-bottom: 12px; line-height: 1.2; }
  .detail-desc {
    font-size: 14px; color: #444; line-height: 1.75;
    margin-bottom: 22px; padding-bottom: 20px;
    border-bottom: 1px solid #f0f0f0;
  }
  .detail-section-title {
    font-size: 11px; font-weight: 700; color: #6b1a1a;
    text-transform: uppercase; letter-spacing: 0.9px; margin-bottom: 12px;
  }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .info-item { background: #faf7f4; border-radius: 12px; padding: 12px 14px; border: 1px solid #f0ebe5; }
  .info-label { font-size: 10px; color: #999; margin-bottom: 3px; }
  .info-val { font-size: 13px; color: #333; font-weight: 600; line-height: 1.35; }
</style>
</head>
<body>

<div class="header">
  <div class="school-logo">🎓</div>
  <div class="header-text">
    <h1>PUP Maragondon Campus</h1>
    <p>Campus Interactive Map — Maragondon, Cavite</p>
  </div>
  <div class="header-hint">📍 Hover &amp; click a building</div>
</div>

<div class="map-outer">
  <div class="map-container" id="mapContainer">
    <img src="campus_map.png" alt="PUP Maragondon Campus Map" draggable="false">

    <!-- B1: Engineering Building -->
    <div class="zone" onclick="openPopup(1)" style="left:4.69%;top:24.07%;width:4.69%;height:36.11%">
      <div class="zone-pin">Engineering Building</div>
    </div>
    <!-- B2: Audio Visual Room -->
    <div class="zone" onclick="openPopup(2)" style="left:4.95%;top:17.13%;width:4.17%;height:5.09%">
      <div class="zone-pin">Audio Visual Room</div>
    </div>
    <!-- B3: Quality Assurance Center -->
    <div class="zone" onclick="openPopup(3)" style="left:14.48%;top:5.93%;width:6.15%;height:6.85%">
      <div class="zone-pin">QA Center</div>
    </div>
    <!-- B4: Building A -->
    <div class="zone" onclick="openPopup(4)" style="left:11.67%;top:45.93%;width:17.81%;height:9.26%">
      <div class="zone-pin">Building A</div>
    </div>
    <!-- B5: Study Shed (top) -->
    <div class="zone" onclick="openPopup(5)" style="left:23.75%;top:22.22%;width:8.54%;height:2.41%">
      <div class="zone-pin">Study Shed</div>
    </div>
    <!-- B6: Study Shed (bottom) -->
    <div class="zone" onclick="openPopup(6)" style="left:36.98%;top:74.44%;width:6.98%;height:1.85%">
      <div class="zone-pin">Study Shed</div>
    </div>
    <!-- B7: Building B -->
    <div class="zone" onclick="openPopup(7)" style="left:33.13%;top:30%;width:2.66%;height:39.63%">
      <div class="zone-pin">Building B</div>
    </div>
    <!-- B8: Remulla Building -->
    <div class="zone" onclick="openPopup(8)" style="left:32.29%;top:74.44%;width:3.65%;height:5.74%">
      <div class="zone-pin">Remulla Building</div>
    </div>
    <!-- B9: Chapel -->
    <div class="zone" onclick="openPopup(9)" style="left:40.21%;top:66.67%;width:1.98%;height:3.52%">
      <div class="zone-pin">Chapel</div>
    </div>
    <!-- B10: Gymnasium -->
    <div class="zone" onclick="openPopup(10)" style="left:47.92%;top:52.96%;width:14.95%;height:19.07%">
      <div class="zone-pin">Gymnasium</div>
    </div>
    <!-- B11: Library -->
    <div class="zone" onclick="openPopup(11)" style="left:44.38%;top:52.96%;width:3.54%;height:19.07%">
      <div class="zone-pin">Library</div>
    </div>
    <!-- B12: Org House Plaza -->
    <div class="zone" onclick="openPopup(12)" style="left:4.79%;top:60.37%;width:14.06%;height:14.26%">
      <div class="zone-pin">Org House Plaza</div>
    </div>
    <!-- B13: Building D -->
    <div class="zone" onclick="openPopup(13)" style="left:6.15%;top:5.93%;width:7.71%;height:7.04%">
      <div class="zone-pin">Building D</div>
    </div>
    <!-- B14: Canteen (top) -->
    <div class="zone" onclick="openPopup(14)" style="left:29.69%;top:59.44%;width:1.67%;height:5.93%">
      <div class="zone-pin">Canteen</div>
    </div>
    <!-- B15: Canteen (bottom) -->
    <div class="zone" onclick="openPopup(15)" style="left:28.02%;top:70.37%;width:2.03%;height:6.30%">
      <div class="zone-pin">Canteen</div>
    </div>

  </div>
</div>

<!-- Mini Popup -->
<div class="popup-overlay" id="popupOverlay" onclick="if(event.target===this)closePopup()">
  <div class="popup-card">
    <div class="popup-banner" id="pBanner"></div>
    <div class="popup-body">
      <div class="popup-tag" id="pTag"></div>
      <div class="popup-title" id="pTitle"></div>
      <div class="popup-desc" id="pDesc"></div>
      <div class="popup-actions">
        <button class="btn btn-close" onclick="closePopup()">✕ Close</button>
        <button class="btn btn-detail" onclick="openDetail()">View Full Info →</button>
      </div>
    </div>
  </div>
</div>

<!-- Detail Panel -->
<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel">
    <div class="detail-banner" id="dBanner">
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body">
      <div class="detail-tag" id="dTag"></div>
      <div class="detail-title" id="dTitle"></div>
      <div class="detail-desc" id="dDesc"></div>
      <div class="detail-section-title">📋 Building Details</div>
      <div class="detail-grid" id="dGrid"></div>
    </div>
  </div>
</div>

<script>
const buildings = {
  1:  { name:"Engineering Building",      tag:"⚙️ Academic",          emoji:"⚙️",  bg:"#e8f0e8", desc:"The primary academic hub for engineering students, this building houses the Multi-Purpose Hall, Computer Laboratory, Mechanical Engineering Laboratory, and Electrical Engineering Laboratory. It also contains eight classrooms used for lectures, laboratory work, and technical instruction.", location:"West Wing, Campus", contact:"PUP Maragondon Office", email:"maragondon@pup.edu.ph", hours:"Mon – Sat, 7:00 AM – 6:00 PM", floors:"Multi-floor" },
  2:  { name:"Audio Visual Room",          tag:"📽️ Facility",          emoji:"📽️",  bg:"#e8e8f5", desc:"A dedicated space for multimedia presentations, seminars, and instructional activities. Equipped with audio-visual tools such as projectors and sound systems to support interactive learning and academic discussions.", location:"North Wing, Campus", contact:"PUP Maragondon Office", email:"maragondon@pup.edu.ph", hours:"Mon – Fri, 8:00 AM – 5:00 PM", floors:"Ground Floor" },
  3:  { name:"Quality Assurance Center",   tag:"📋 Administration",    emoji:"🏅",  bg:"#f5f0e8", desc:"Manages and oversees academic standards, institutional evaluations, and compliance processes. Serves as the center for maintaining educational quality, accreditation requirements, and continuous improvement initiatives.", location:"North Area, Campus", contact:"PUP Maragondon Office", email:"maragondon@pup.edu.ph", hours:"Mon – Fri, 8:00 AM – 5:00 PM", floors:"Ground Floor" },
  4:  { name:"Building A",                 tag:"🏢 Academic & Admin",  emoji:"🏛️",  bg:"#eee8f5", desc:"A central administrative and academic building. The first floor houses the Registrar's Office, Office of Student Services, Director's Office, Director's Lounge, and Accounting Office. The second floor is dedicated to classrooms for various academic programs.", location:"Central Campus", contact:"PUP Maragondon Office", email:"maragondon@pup.edu.ph", hours:"Mon – Fri, 8:00 AM – 5:00 PM", floors:"2 Floors" },
  5:  { name:"Study Shed",                 tag:"🌿 Student Space",     emoji:"☀️",  bg:"#e8f5e8", desc:"An open and accessible space designed for students to study, collaborate, and relax. Provides a casual environment for group discussions, individual work, and social interaction between classes.", location:"Open Area, North", contact:"PUP Maragondon Office", email:"maragondon@pup.edu.ph", hours:"Open during school hours", floors:"Open Air" },
  6:  { name:"Study Shed",                 tag:"🌿 Student Space",     emoji:"🌤️",  bg:"#e8f5e8", desc:"A secondary study area that offers students a quiet and informal setting for studying and socializing. Serves as an alternative space for rest, collaboration, and academic activities during the day.", location:"South Area, Campus", contact:"PUP Maragondon Office", email:"maragondon@pup.edu.ph", hours:"Open during school hours", floors:"Open Air" },
  7:  { name:"Building B",                 tag:"🏗️ Multi-Purpose",     emoji:"🏢",  bg:"#f5e8e8", desc:"A multi-functional building supporting both academic and student services. Houses the Campus Clinic, Faculty Lounge, Student Council Office, Chemical Laboratory, Facility Management Office, and two classrooms for instruction and laboratory use.", location:"Central-East Campus", contact:"PUP Maragondon Office", email:"maragondon@pup.edu.ph", hours:"Mon – Sat, 7:00 AM – 6:00 PM", floors:"Multi-floor" },
  8:  { name:"Remulla Building",           tag:"🏫 Classroom",         emoji:"🏫",  bg:"#f0ece8", desc:"A building donated by the Remulla family, primarily used as a classroom facility. Supports academic activities by providing additional space for lectures and student learning across various programs.", location:"South-Central Campus", contact:"PUP Maragondon Office", email:"maragondon@pup.edu.ph", hours:"Mon – Sat, 7:00 AM – 6:00 PM", floors:"Ground Floor" },
  9:  { name:"Chapel",                     tag:"⛪ Spiritual",          emoji:"⛪",  bg:"#f5f0e8", desc:"A quiet and sacred space within the campus for prayer, reflection, and spiritual activities. Open to students, faculty, and staff seeking a place for personal devotion or small religious gatherings.", location:"Central-South Campus", contact:"PUP Maragondon Office", email:"maragondon@pup.edu.ph", hours:"Open during school hours", floors:"Ground Floor" },
  10: { name:"Gymnasium",                  tag:"🏋️ Sports & Events",   emoji:"🏋️",  bg:"#e8eef5", desc:"A large facility used for major campus events, sports activities, and physical wellness programs. Accommodates assemblies, competitions, and recreational activities for students, faculty, and staff.", location:"East Campus", contact:"PUP Maragondon Office", email:"maragondon@pup.edu.ph", hours:"Mon – Sat, 7:00 AM – 8:00 PM", floors:"Main Hall + Bleachers" },
  11: { name:"Library",                    tag:"📚 Academic Resource",  emoji:"📚",  bg:"#e8f2e8", desc:"A resource center providing students access to books, academic references, and study materials. Offers a quiet environment conducive to reading, research, and independent learning for all campus members.", location:"East Campus", contact:"PUP Maragondon Office", email:"maragondon@pup.edu.ph", hours:"Mon – Fri, 8:00 AM – 5:00 PM", floors:"Ground Floor" },
  12: { name:"Org House Plaza",            tag:"🤝 Student Orgs",       emoji:"🏡",  bg:"#f0f5e8", desc:"A designated area for academic and student organizations. Serves as a hub for organizational activities, meetings, and collaboration among different student groups active on campus.", location:"South-West Campus", contact:"Student Affairs Office", email:"maragondon@pup.edu.ph", hours:"Mon – Sat, 8:00 AM – 5:00 PM", floors:"Ground Floor" },
  13: { name:"Building D",                 tag:"🏚️ Future Use",         emoji:"🏗️",  bg:"#ededf0", desc:"Not currently in active use, this building may serve as a potential space for future development, renovation, or repurposing depending on campus needs and institutional plans.", location:"North-West Campus", contact:"PUP Maragondon Office", email:"maragondon@pup.edu.ph", hours:"Not in active use", floors:"Ground Floor" },
  14: { name:"Canteen",                    tag:"🍽️ Food Service",       emoji:"🍽️",  bg:"#f5ede8", desc:"A campus food service area where students and staff can purchase meals, snacks, and beverages. Provides a convenient space for dining and short breaks between classes during the school day.", location:"Central Campus", contact:"PUP Maragondon Office", email:"maragondon@pup.edu.ph", hours:"Mon – Sat, 7:00 AM – 5:00 PM", floors:"Ground Floor" },
  15: { name:"Canteen",                    tag:"🍽️ Food Service",       emoji:"🥘",  bg:"#f5ede8", desc:"An additional canteen facility helping accommodate the campus population by offering food and refreshments. Supports student convenience, especially during peak dining hours throughout the school day.", location:"South Campus", contact:"PUP Maragondon Office", email:"maragondon@pup.edu.ph", hours:"Mon – Sat, 7:00 AM – 5:00 PM", floors:"Ground Floor" }
};

let currentId = null;

function openPopup(id) {
  currentId = id;
  const b = buildings[id];
  const banner = document.getElementById('pBanner');
  banner.style.background = b.bg;
  banner.textContent = b.emoji;
  document.getElementById('pTag').textContent = b.tag;
  document.getElementById('pTitle').textContent = b.name;
  document.getElementById('pDesc').textContent = b.desc;
  document.getElementById('popupOverlay').classList.add('active');
}
function closePopup() {
  document.getElementById('popupOverlay').classList.remove('active');
}
function openDetail() {
  const b = buildings[currentId];
  const banner = document.getElementById('dBanner');
  banner.style.background = b.bg;
  // keep close button, set emoji before it
  banner.innerHTML = b.emoji + '<button class="detail-close" onclick="closeDetail()">✕</button>';
  document.getElementById('dTag').textContent = b.tag;
  document.getElementById('dTitle').textContent = b.name;
  document.getElementById('dDesc').textContent = b.desc;
  document.getElementById('dGrid').innerHTML =
    row('📍','Location', b.location) +
    row('📞','Contact',  b.contact)  +
    row('✉️','Email',    b.email)    +
    row('🕐','Hours',    b.hours)    +
    row('🏗️','Floors',   b.floors);
  closePopup();
  document.getElementById('detailOverlay').classList.add('active');
}
function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('active');
}
function row(icon, label, val) {
  return `<div class="info-item"><div class="info-label">${icon} ${label}</div><div class="info-val">${val||'—'}</div></div>`;
}
</script>
</body>
</html>
