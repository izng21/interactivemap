<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Interactive Map | PUP Maragondon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --academic: #3B5BDB;
    --academic-light: #DBE4FF;
    --science: #0B7285;
    --science-light: #C5F6FA;
    --sports: #2F9E44;
    --sports-light: #D3F9D8;
    --services: #E67700;
    --services-light: #FFF3BF;
    --cultural: #862E9C;
    --cultural-light: #F3D9FA;
    --health: #C92A2A;
    --health-light: #FFE3E3;
    --shadow: rgba(30,40,80,0.12);
    --text-dark: #1A1F36;
    --text-mid: #4A5068;
    --text-light: #7A829A;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1A1F36;
    font-family: 'DM Sans', system-ui, sans-serif;
  }

  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(20,24,46,0.94);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 56px;
  }
  #header h1 {
    font-size: 16px; font-weight: 600; color: #fff; letter-spacing: 0.2px;
    display: flex; align-items: center; gap: 10px;
  }
  #header h1 span { font-weight: 300; opacity: 0.55; }
  .header-badge {
    font-size: 11px; font-weight: 500; padding: 3px 10px;
    background: rgba(59,91,219,0.25); color: #98B4FF;
    border: 1px solid rgba(59,91,219,0.35); border-radius: 20px;
  }
  .zoom-controls { display: flex; align-items: center; gap: 4px; }
  .zoom-btn {
    width: 32px; height: 32px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06); color: #fff; font-size: 18px;
    border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s; user-select: none;
  }
  .zoom-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }
  #zoom-label {
    font-size: 12px; color: rgba(255,255,255,0.45); min-width: 42px; text-align: center;
    font-family: 'DM Mono', monospace;
  }

  #map-wrap {
    position: fixed; inset: 56px 0 0 0;
    overflow: hidden; cursor: grab;
    background: #1A1F36;
  }
  #map-wrap.dragging { cursor: grabbing; }
  #map-stage {
    position: absolute;
    transform-origin: 0 0;
    will-change: transform;
  }

  .bld { cursor: pointer; }
  .bld-face {
    transition: opacity 0.15s;
    opacity: 0.30;
  }
  .bld:hover .bld-face { opacity: 0.55; }
  .bld-label {
    pointer-events: none;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 7px;
    fill: white;
    text-anchor: middle;
    dominant-baseline: central;
    paint-order: stroke;
    stroke: rgba(0,0,0,0.7);
    stroke-width: 2.5px;
    stroke-linejoin: round;
  }

  #popup {
    position: absolute; z-index: 200;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(20,24,80,0.18), 0 2px 8px rgba(20,24,80,0.1);
    width: 280px;
    pointer-events: all;
    transform-origin: bottom center;
    animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
    display: none;
    overflow: hidden;
  }
  #popup.visible { display: block; }
  @keyframes popIn {
    from { opacity: 0; transform: translateY(8px) scale(0.94); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .popup-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid #F0F2F8;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .popup-icon {
    width: 42px; height: 42px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .popup-title { font-size: 14px; font-weight: 600; color: var(--text-dark); line-height: 1.3; }
  .popup-type  { font-size: 11px; font-weight: 500; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  .popup-body  { padding: 12px 16px; }
  .popup-desc  { font-size: 12px; color: var(--text-mid); line-height: 1.5; margin-top: 4px; font-style: italic; }
  .popup-footer {
    padding: 10px 16px 14px;
    display: flex; gap: 8px;
  }
  .btn-close {
    flex: 1; height: 34px; border-radius: 8px;
    border: 1px solid #E8EBF4; background: #fff;
    font-size: 12px; font-weight: 500; color: var(--text-mid);
    cursor: pointer; transition: background 0.12s;
  }
  .btn-close:hover { background: #F4F6FF; }
  .btn-detail {
    flex: 2; height: 34px; border-radius: 8px;
    border: none;
    font-size: 12px; font-weight: 600; color: #fff;
    cursor: pointer; transition: filter 0.12s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .btn-detail:hover { filter: brightness(1.1); }
  .btn-detail:active { transform: scale(0.97); }

  #detail-page {
    position: fixed; inset: 0; z-index: 500;
    background: #F8F9FC;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  #detail-page.open { transform: translateY(0); }

  .detail-hero {
    position: relative; height: 200px;
    display: flex; align-items: flex-end;
    padding: 24px 32px;
    overflow: hidden;
  }
  .detail-hero-bg {
    position: absolute; inset: 0;
    opacity: 0.12;
    font-size: 240px;
    display: flex; align-items: center; justify-content: center;
    line-height: 1; user-select: none;
  }
  .detail-back {
    position: absolute; top: 20px; left: 24px;
    width: 40px; height: 40px; border-radius: 12px;
    background: rgba(255,255,255,0.2); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff; font-size: 20px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .detail-back:hover { background: rgba(255,255,255,0.3); }
  .detail-hero-content { position: relative; z-index: 1; color: #fff; }
  .detail-hero-badge {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px;
    background: rgba(255,255,255,0.2); backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.25);
    padding: 4px 12px; border-radius: 20px;
    display: inline-block; margin-bottom: 10px;
  }
  .detail-hero h2 { font-size: 26px; font-weight: 600; line-height: 1.2; margin: 0; }
  .detail-hero p  { font-size: 14px; opacity: 0.82; margin-top: 4px; }

  .detail-body { max-width: 860px; margin: 0 auto; padding: 28px 32px 60px; }
  .detail-empty {
    background: #fff; border: 1px dashed #D0D5E8; border-radius: 14px;
    padding: 32px; text-align: center; color: var(--text-light);
    font-size: 14px; margin-bottom: 20px;
  }
  .detail-empty strong { display: block; font-size: 16px; color: var(--text-mid); margin-bottom: 6px; }

  #legend {
    position: fixed; bottom: 20px; left: 20px; z-index: 100;
    background: rgba(20,24,46,0.88); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 12px 14px;
    display: flex; flex-direction: column; gap: 7px;
  }
  .legend-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: rgba(255,255,255,0.4); margin-bottom: 2px; }
  .legend-item  { display: flex; align-items: center; gap: 8px; font-size: 11px; color: rgba(255,255,255,0.7); }
  .legend-dot   { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  #compass {
    position: fixed; bottom: 20px; right: 20px; z-index: 100;
    width: 52px; height: 52px;
  }

  @media (max-width: 600px) {
    .detail-body { padding: 20px 16px 60px; }
    .detail-hero { padding: 20px 16px; }
    #legend { display: none; }
  }
</style>
</head>

</div>

    },
    engineering: {

      type: "Academic Building",

    },
    audiovisual: {

      emoji: "🎬",
      type: "Academic Facility",
      typeColor: "#862E9C",
      typeBg: "#F3D9FA",

    },
    buildingD: {
      name: "Building D",
      emoji: "🏫",
      type: "Academic Building",
      typeColor: "#3B5BDB",
      typeBg: "#DBE4FF",
      sub: "",
      about: "",
    },
    gac: {
      name: "GAC Building",
      emoji: "🏛",
      type: "Facility",
      typeColor: "#E67700",

    },
    gymnasium: {
      name: "Gymnasium",
      emoji: "🏋",

      typeColor: "#2F9E44",

    },
    remulla: {
      name: "Remulla Building",
      emoji: "🏢",
      type: "Academic Building",
      typeColor: "#C92A2A",

    },
    studyshed: {
      name: "Student Study Shed",
      emoji: "📚",
      type: "Student Services",
      typeColor: "#20C997",
      typeBg: "#C3FAE8",
      sub: "",
      about: "",
    },
    canteen: {
      name: "Canteen",
      emoji: "🍽",
      type: "Dining",
      typeColor: "#E67700",
      typeBg: "#FFF3BF",
      sub: "",
      about: "",
    },
    orghouse: {
      name: "Org House",
      emoji: "🏠",
      type: "Student Organizations",
      typeColor: "#862E9C",
      typeBg: "#F3D9FA",
      sub: "",
      about: "",
    },
    parking: {
      name: "Parking Area",
      emoji: "🅿",
      type: "Facility",
      typeColor: "#6B7280",
      typeBg: "#F3F4F6",
      sub: "",
      about: "",
    },
  };

  let currentId = null;

  // ── PAN & ZOOM ──
  const wrap  = document.getElementById('map-wrap');
  const stage = document.getElementById('map-stage');
  let scale = 1, tx = 0, ty = 0;
  let dragging = false, startX = 0, startY = 0, startTx = 0, startTy = 0;

  function applyTransform() {
    stage.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
  }

  function fitToScreen() {
    const rect = wrap.getBoundingClientRect();
    const imgW = 299, imgH = 427;
    scale = Math.min(rect.width / imgW, rect.height / imgH) * 0.88;
    tx = (rect.width  - imgW * scale) / 2;
    ty = (rect.height - imgH * scale) / 2;
    applyTransform();
  }

  window.changeZoom = function(delta) {
    const rect = wrap.getBoundingClientRect();
    const cx = rect.width / 2, cy = rect.height / 2;
    const newScale = Math.min(6, Math.max(0.4, scale + delta));
    tx = cx - (cx - tx) * (newScale / scale);
    ty = cy - (cy - ty) * (newScale / scale);
    scale = newScale;
    applyTransform();
  };

  window.resetView = fitToScreen;

  wrap.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = wrap.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const delta = e.deltaY < 0 ? 0.15 : -0.15;
    const newScale = Math.min(6, Math.max(0.4, scale + delta));
    tx = mx - (mx - tx) * (newScale / scale);
    ty = my - (my - ty) * (newScale / scale);
    scale = newScale;
    applyTransform();
  }, { passive: false });

  wrap.addEventListener('mousedown', e => {
    if (e.target.closest('.bld') || e.target.closest('#popup')) return;
    dragging = true; wrap.classList.add('dragging');
    startX = e.clientX; startY = e.clientY; startTx = tx; startTy = ty;
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    tx = startTx + (e.clientX - startX);
    ty = startTy + (e.clientY - startY);
    applyTransform();
  });
  document.addEventListener('mouseup', () => { dragging = false; wrap.classList.remove('dragging'); });

  // Touch
  let lastTouchDist = null;
  wrap.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      dragging = true;
      startX = e.touches[0].clientX; startY = e.touches[0].clientY;
      startTx = tx; startTy = ty;
    }
    if (e.touches.length === 2) {
      lastTouchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY);
    }
  }, { passive: true });
  wrap.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && dragging) {
      tx = startTx + (e.touches[0].clientX - startX);
      ty = startTy + (e.touches[0].clientY - startY);
      applyTransform();
    }
    if (e.touches.length === 2 && lastTouchDist) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY);
      const delta = (dist - lastTouchDist) * 0.006;
      const rect = wrap.getBoundingClientRect();
      const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
      const my = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
      const newScale = Math.min(6, Math.max(0.4, scale + delta));
      tx = mx - (mx - tx) * (newScale / scale);
      ty = my - (my - ty) * (newScale / scale);
      scale = newScale; lastTouchDist = dist;
      applyTransform();
    }
    e.preventDefault();
  }, { passive: false });
  wrap.addEventListener('touchend', () => { dragging = false; lastTouchDist = null; });

  // ── POPUP ──
  window.showPopup = function(event, id) {
    event.stopPropagation();
    currentId = id;
    const b = BUILDINGS[id];
    const popup = document.getElementById('popup');

    document.getElementById('p-icon').textContent = b.emoji;
    document.getElementById('p-icon').style.background = b.typeBg;
    document.getElementById('p-title').textContent = b.name;
    document.getElementById('p-type').textContent = b.type;
    document.getElementById('p-type').style.color = b.typeColor;
    document.getElementById('p-btn').style.background = b.typeColor;
    document.getElementById('p-desc').textContent =
      b.about ? b.about.substring(0, 120) + (b.about.length > 120 ? '…' : '') :
      'No description available yet.';

    const mapRect = wrap.getBoundingClientRect();
    const bldEl = document.querySelector(`[data-id="${id}"]`);
    const bldRect = bldEl.getBoundingClientRect();

    let px = bldRect.left + bldRect.width / 2 - mapRect.left - 140;
    let py = bldRect.top - mapRect.top - 10;
    if (py < 10) py = bldRect.bottom - mapRect.top + 10;
    if (px < 10) px = 10;
    if (px + 280 > mapRect.width - 10) px = mapRect.width - 290;

    popup.style.left = px + 'px';
    popup.style.top  = py + 'px';
    popup.classList.add('visible');
    popup.style.animation = 'none';
    popup.offsetHeight;
    popup.style.animation = '';
  };

  window.closePopup = function() {
    document.getElementById('popup').classList.remove('visible');
  };

  wrap.addEventListener('click', e => {
    if (!e.target.closest('#popup') && !e.target.closest('.bld')) window.closePopup();
  });

  // ── DETAIL PAGE ──
  window.openDetail = function() {
    if (!currentId || !BUILDINGS[currentId]) return;
    const b = BUILDINGS[currentId];
    const page = document.getElementById('detail-page');

    document.getElementById('d-hero').style.background =
      `linear-gradient(135deg, ${b.typeColor}, ${b.typeColor}CC)`;
    document.getElementById('d-hero-emoji').textContent = b.emoji;
    document.getElementById('d-badge').textContent = b.type;
    document.getElementById('d-name').textContent = b.name;
    document.getElementById('d-sub').textContent = b.sub || '';

    window.closePopup();
    page.classList.add('open');
  };

  window.closeDetail = function() {
    document.getElementById('detail-page').classList.remove('open');
  };

  // Initialize view to fit the campus map on screen
  fitToScreen();
})();
</script>
