<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Interactive Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky: #EEF4FF;
    --path: #DDE3EE;
    --grass: #D8EDDA;
    --grass-deep: #B8D9BB;
    --court: #C8D8F0;
    --parking: #E8E4DC;
    --water: #C2D9F0;
    --academic: #3B5BDB;
    --academic-light: #DBE4FF;
    --science: #0B7285;
    --science-light: #C5F6FA;
    --sports: #2F9E44;
    --sports-light: #D3F9D8;
    --services: #E67700;
    --services-light: #FFF3BF;
    --cultural: #862E9C;
    --cultural-light: #F3D9FA;
    --health: #C92A2A;
    --health-light: #FFE3E3;
    --shadow: rgba(30,40,80,0.12);
    --shadow-strong: rgba(30,40,80,0.22);
    --text-dark: #1A1F36;
    --text-mid: #4A5068;
    --text-light: #7A829A;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1A1F36;
    font-family: 'DM Sans', system-ui, sans-serif;
  }

  /* ── HEADER ── */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(20,24,46,0.94);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 56px;
  }
  #header h1 {
    font-size: 16px; font-weight: 600; color: #fff; letter-spacing: 0.2px;
    display: flex; align-items: center; gap: 10px;
  }
  #header h1 span { font-weight: 300; opacity: 0.55; }
  .header-badge {
    font-size: 11px; font-weight: 500; padding: 3px 10px;
    background: rgba(59,91,219,0.25); color: #98B4FF;
    border: 1px solid rgba(59,91,219,0.35); border-radius: 20px;
  }
  .zoom-controls {
    display: flex; align-items: center; gap: 4px;
  }
  .zoom-btn {
    width: 32px; height: 32px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06); color: #fff; font-size: 18px;
    border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s; user-select: none;
  }
  .zoom-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }
  #zoom-label {
    font-size: 12px; color: rgba(255,255,255,0.45); min-width: 42px; text-align: center;
    font-family: 'DM Mono', monospace;
  }

  /* ── MAP CANVAS ── */
  #map-wrap {
    position: fixed; inset: 56px 0 0 0;
    overflow: hidden; cursor: grab;
    background: #1A1F36;
  }
  #map-wrap.dragging { cursor: grabbing; }
  #map-stage {
    position: absolute;
    transform-origin: 0 0;
    will-change: transform;
  }

  /* ── BUILDING GROUPS ── */
  .bld {
    cursor: pointer;
    transition: filter 0.15s;
  }
  .bld:hover .bld-face { filter: brightness(1.08); }
  .bld:hover .bld-shadow { opacity: 0.5; }
  .bld-shadow { opacity: 0.25; transition: opacity 0.15s; }
  .bld-face { transition: filter 0.15s; }

  /* ── TOOLTIP POPUP ── */
  #popup {
    position: absolute; z-index: 200;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(20,24,80,0.18), 0 2px 8px rgba(20,24,80,0.1);
    width: 280px;
    pointer-events: all;
    transform-origin: bottom center;
    animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
    display: none;
    overflow: hidden;
  }
  #popup.visible { display: block; }
  @keyframes popIn {
    from { opacity: 0; transform: translateY(8px) scale(0.94); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .popup-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid #F0F2F8;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .popup-icon {
    width: 42px; height: 42px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .popup-title { font-size: 14px; font-weight: 600; color: var(--text-dark); line-height: 1.3; }
  .popup-type  { font-size: 11px; font-weight: 500; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  .popup-body  { padding: 12px 16px; }
  .popup-meta  { display: flex; flex-direction: column; gap: 6px; }
  .popup-row   { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-mid); }
  .popup-row svg { flex-shrink: 0; opacity: 0.6; }
  .popup-desc  { font-size: 12px; color: var(--text-mid); line-height: 1.5; margin-top: 8px; }
  .popup-footer {
    padding: 10px 16px 14px;
    display: flex; gap: 8px;
  }
  .btn-close {
    flex: 1; height: 34px; border-radius: 8px;
    border: 1px solid #E8EBF4; background: #fff;
    font-size: 12px; font-weight: 500; color: var(--text-mid);
    cursor: pointer; transition: background 0.12s;
  }
  .btn-close:hover { background: #F4F6FF; }
  .btn-detail {
    flex: 2; height: 34px; border-radius: 8px;
    border: none;
    font-size: 12px; font-weight: 600; color: #fff;
    cursor: pointer; transition: filter 0.12s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .btn-detail:hover { filter: brightness(1.1); }
  .btn-detail:active { transform: scale(0.97); }
  .popup-arrow {
    position: absolute; bottom: -9px; left: 50%;
    transform: translateX(-50%);
    width: 18px; height: 10px;
    overflow: visible;
  }

  /* ── DETAIL PAGE ── */
  #detail-page {
    position: fixed; inset: 0; z-index: 500;
    background: #F8F9FC;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  #detail-page.open { transform: translateY(0); }

  .detail-hero {
    position: relative; height: 220px;
    display: flex; align-items: flex-end;
    padding: 24px 32px;
    overflow: hidden;
  }
  .detail-hero-bg {
    position: absolute; inset: 0;
    opacity: 0.12;
    font-size: 260px;
    display: flex; align-items: center; justify-content: center;
    line-height: 1; user-select: none;
  }
  .detail-back {
    position: absolute; top: 20px; left: 24px;
    width: 40px; height: 40px; border-radius: 12px;
    background: rgba(255,255,255,0.2); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff; font-size: 20px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .detail-back:hover { background: rgba(255,255,255,0.3); }
  .detail-hero-content { position: relative; z-index: 1; color: #fff; }
  .detail-hero-badge {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px;
    background: rgba(255,255,255,0.2); backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.25);
    padding: 4px 12px; border-radius: 20px;
    display: inline-block; margin-bottom: 10px;
  }
  .detail-hero h2 { font-size: 26px; font-weight: 600; line-height: 1.2; margin: 0; }
  .detail-hero p  { font-size: 14px; opacity: 0.82; margin-top: 4px; }

  .detail-body { max-width: 860px; margin: 0 auto; padding: 28px 32px 60px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 28px; }
  .detail-stat {
    background: #fff; border: 1px solid #E8EBF4; border-radius: 14px; padding: 16px;
  }
  .detail-stat label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-light); }
  .detail-stat p { font-size: 18px; font-weight: 600; color: var(--text-dark); margin-top: 4px; }

  .detail-section { margin-bottom: 28px; }
  .detail-section h3 { font-size: 15px; font-weight: 600; color: var(--text-dark); margin-bottom: 12px;
    padding-bottom: 8px; border-bottom: 1px solid #E8EBF4; }
  .detail-section p { font-size: 14px; color: var(--text-mid); line-height: 1.65; }

  .detail-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .detail-list li {
    background: #fff; border: 1px solid #E8EBF4; border-radius: 10px;
    padding: 12px 14px; font-size: 13px; color: var(--text-mid);
    display: flex; align-items: center; gap: 10px;
  }
  .detail-list li strong { color: var(--text-dark); font-weight: 500; min-width: 120px; }

  .detail-hours { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .hour-row {
    background: #fff; border: 1px solid #E8EBF4; border-radius: 10px;
    padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;
    font-size: 13px;
  }
  .hour-row .day { color: var(--text-mid); }
  .hour-row .time { font-weight: 500; color: var(--text-dark); font-family: 'DM Mono', monospace; font-size: 12px; }

  /* ── LEGEND ── */
  #legend {
    position: fixed; bottom: 20px; left: 20px; z-index: 100;
    background: rgba(20,24,46,0.88); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 12px 14px;
    display: flex; flex-direction: column; gap: 7px;
  }
  .legend-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: rgba(255,255,255,0.4); margin-bottom: 2px; }
  .legend-item  { display: flex; align-items: center; gap: 8px; font-size: 11px; color: rgba(255,255,255,0.7); }
  .legend-dot   { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  /* ── COMPASS ── */
  #compass {
    position: fixed; bottom: 20px; right: 20px; z-index: 100;
    width: 52px; height: 52px;
  }

  /* ── MINI LABEL ── */
  .map-label { font-family: 'DM Sans', sans-serif; pointer-events: none; }

  @media (max-width: 600px) {
    .detail-grid { grid-template-columns: 1fr 1fr; }
    .detail-body { padding: 20px 16px 60px; }
    .detail-hero { padding: 20px 16px; }
    #legend { display: none; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <h1>🎓 Sample Map for Reference <span>/ Campus Map</span></h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="header-badge">Interactive</span>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="changeZoom(-0.2)">−</button>
      <span id="zoom-label">100%</span>
      <button class="zoom-btn" onclick="changeZoom(+0.2)">+</button>
      <button class="zoom-btn" title="Reset view" onclick="resetView()" style="font-size:13px;">⌂</button>
    </div>
  </div>
</div>

<!-- MAP -->
<div id="map-wrap">
  <div id="map-stage">
    <svg id="campus-svg" width="1400" height="1000" viewBox="0 0 1400 1000"
         xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="bld-shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="3" dy="4" stdDeviation="5" flood-color="#1A2050" flood-opacity="0.25"/>
        </filter>
        <pattern id="grass-pat" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
          <rect width="20" height="20" fill="#C8DFCA"/>
          <line x1="0" y1="10" x2="20" y2="10" stroke="#B8D0BA" stroke-width="0.5" opacity="0.5"/>
          <line x1="10" y1="0" x2="10" y2="20" stroke="#B8D0BA" stroke-width="0.5" opacity="0.5"/>
        </pattern>
        <pattern id="path-pat" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
          <rect width="12" height="12" fill="#D8DDE8"/>
          <line x1="0" y1="6" x2="12" y2="6" stroke="#CCD1DC" stroke-width="0.4" opacity="0.6"/>
        </pattern>
      </defs>

      <!-- GROUND -->
      <rect x="0" y="0" width="1400" height="1000" fill="#C4CCDA"/>

      <!-- OUTER CAMPUS BOUNDARY -->
      <rect x="30" y="30" width="1340" height="940" rx="20"
            fill="#D4DBE6" stroke="#B0BAC8" stroke-width="1.5"/>

      <!-- GRASS AREAS -->
      <rect x="60" y="60" width="1280" height="880" rx="14" fill="url(#grass-pat)"/>

      <!-- MAIN ROADS (horizontal + vertical) -->
      <rect x="60" y="460" width="1280" height="56" fill="url(#path-pat)" rx="4"/>
      <rect x="620" y="60"  width="56"  height="880" fill="url(#path-pat)" rx="4"/>
      <!-- secondary paths -->
      <rect x="60"  y="240" width="620" height="32" fill="url(#path-pat)" rx="3" opacity="0.7"/>
      <rect x="676" y="240" width="664" height="32" fill="url(#path-pat)" rx="3" opacity="0.7"/>
      <rect x="60"  y="680" width="560" height="28" fill="url(#path-pat)" rx="3" opacity="0.7"/>
      <rect x="676" y="680" width="664" height="28" fill="url(#path-pat)" rx="3" opacity="0.7"/>
      <rect x="300" y="60"  width="32"  height="400" fill="url(#path-pat)" rx="3" opacity="0.7"/>
      <rect x="300" y="516" width="32"  height="424" fill="url(#path-pat)" rx="3" opacity="0.7"/>
      <rect x="920" y="60"  width="32"  height="400" fill="url(#path-pat)" rx="3" opacity="0.7"/>
      <rect x="920" y="516" width="32"  height="424" fill="url(#path-pat)" rx="3" opacity="0.7"/>

      <!-- SPORTS FIELD (large green) -->
      <rect x="80" y="720" width="480" height="200" rx="10" fill="#A8D5A2" stroke="#7EBA78" stroke-width="1.2"/>
      <ellipse cx="320" cy="820" rx="180" ry="80" fill="none" stroke="#7EBA78" stroke-width="1" opacity="0.6"/>
      <line x1="320" y1="720" x2="320" y2="920" stroke="#7EBA78" stroke-width="1" opacity="0.5"/>
      <text x="320" y="820" text-anchor="middle" dominant-baseline="central"
            font-family="DM Sans,sans-serif" font-size="13" fill="#4A8A44" font-weight="500" opacity="0.8">⚽ Sports Field</text>

      <!-- BASKETBALL COURTS -->
      <rect x="680" y="720" width="200" height="100" rx="6" fill="#B0C8E8" stroke="#7EA8CC" stroke-width="1.2"/>
      <line x1="780" y1="720" x2="780" y2="820" stroke="#7EA8CC" stroke-width="0.8" opacity="0.7"/>
      <circle cx="730" cy="770" r="18" fill="none" stroke="#7EA8CC" stroke-width="0.8" opacity="0.6"/>
      <circle cx="830" cy="770" r="18" fill="none" stroke="#7EA8CC" stroke-width="0.8" opacity="0.6"/>
      <text x="780" y="838" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#4A6A8A" opacity="0.8">🏀 Courts</text>

      <!-- SWIMMING POOL -->
      <rect x="900" y="720" width="160" height="100" rx="16" fill="#8EC8F0" stroke="#5AAEDC" stroke-width="1.2"/>
      <rect x="914" y="734" width="132" height="72" rx="12" fill="none" stroke="#5AAEDC" stroke-width="0.7" opacity="0.5" stroke-dasharray="4 3"/>
      <text x="980" y="775" text-anchor="middle" dominant-baseline="central"
            font-family="DM Sans,sans-serif" font-size="11" fill="#1A6A9A">🏊 Pool</text>

      <!-- PARKING LOTS -->
      <rect x="1100" y="720" width="220" height="200" rx="6" fill="#E0DBD0" stroke="#C0BAB0" stroke-width="1"/>
      <line x1="1110" y1="740" x2="1110" y2="900" stroke="#C0BAB0" stroke-width="0.7" stroke-dasharray="6 4" opacity="0.6"/>
      <line x1="1140" y1="740" x2="1140" y2="900" stroke="#C0BAB0" stroke-width="0.7" stroke-dasharray="6 4" opacity="0.6"/>
      <line x1="1170" y1="740" x2="1170" y2="900" stroke="#C0BAB0" stroke-width="0.7" stroke-dasharray="6 4" opacity="0.6"/>
      <line x1="1200" y1="740" x2="1200" y2="900" stroke="#C0BAB0" stroke-width="0.7" stroke-dasharray="6 4" opacity="0.6"/>
      <line x1="1230" y1="740" x2="1230" y2="900" stroke="#C0BAB0" stroke-width="0.7" stroke-dasharray="6 4" opacity="0.6"/>
      <line x1="1260" y1="740" x2="1260" y2="900" stroke="#C0BAB0" stroke-width="0.7" stroke-dasharray="6 4" opacity="0.6"/>
      <text x="1210" y="916" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="12" fill="#7A7060" opacity="0.9">🅿 Parking</text>

      <!-- GARDEN / COURTYARD -->
      <rect x="680" y="840" width="380" height="100" rx="10" fill="#B8E0B0" stroke="#88C080" stroke-width="1"/>
      <circle cx="760" cy="890" r="22" fill="#90C888" stroke="#68A860" stroke-width="1"/>
      <circle cx="870" cy="888" r="18" fill="#90C888" stroke="#68A860" stroke-width="1"/>
      <circle cx="970" cy="890" r="20" fill="#90C888" stroke="#68A860" stroke-width="1"/>
      <text x="870" y="930" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#3A6834" opacity="0.9">🌿 Garden & Amphitheater</text>

      <!-- ═══ BUILDINGS ═══ -->

      <!-- 1. ADMINISTRATION BUILDING -->
      <g class="bld" data-id="admin" onclick="showPopup(event,'admin')">
        <rect class="bld-shadow" x="458" y="74" width="200" height="140" rx="10" fill="#1A2050" filter="url(#bld-shadow)"/>
        <rect class="bld-face" x="450" y="68" width="200" height="140" rx="10"
              fill="#3B5BDB" stroke="#2748C8" stroke-width="1.5"/>
        <rect x="450" y="68" width="200" height="32" rx="10" fill="rgba(255,255,255,0.1)"/>
        <rect x="450" y="88" width="200" height="12" fill="rgba(255,255,255,0.07)"/>
        <!-- windows -->
        <rect x="466" y="84" width="22" height="16" rx="3" fill="rgba(255,255,255,0.18)"/>
        <rect x="498" y="84" width="22" height="16" rx="3" fill="rgba(255,255,255,0.18)"/>
        <rect x="530" y="84" width="22" height="16" rx="3" fill="rgba(255,255,255,0.18)"/>
        <rect x="562" y="84" width="22" height="16" rx="3" fill="rgba(255,255,255,0.18)"/>
        <rect x="594" y="84" width="22" height="16" rx="3" fill="rgba(255,255,255,0.18)"/>
        <rect x="466" y="112" width="22" height="16" rx="3" fill="rgba(255,255,255,0.15)"/>
        <rect x="498" y="112" width="22" height="16" rx="3" fill="rgba(255,255,255,0.15)"/>
        <rect x="530" y="112" width="22" height="16" rx="3" fill="rgba(255,255,255,0.15)"/>
        <rect x="562" y="112" width="22" height="16" rx="3" fill="rgba(255,255,255,0.15)"/>
        <rect x="594" y="112" width="22" height="16" rx="3" fill="rgba(255,255,255,0.15)"/>
        <!-- door -->
        <rect x="530" y="162" width="40" height="46" rx="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
        <!-- label -->
        <text x="550" y="150" text-anchor="middle" dominant-baseline="central" class="map-label"
              font-family="DM Sans,sans-serif" font-size="12" fill="white" font-weight="600">🏛 Admin</text>
      </g>

      <!-- 2. LIBRARY -->
      <g class="bld" data-id="library" onclick="showPopup(event,'library')">
        <rect class="bld-shadow" x="768" y="74" width="170" height="130" rx="10" fill="#1A2050" filter="url(#bld-shadow)"/>
        <rect class="bld-face" x="760" y="68" width="170" height="130" rx="10"
              fill="#0B7285" stroke="#087A96" stroke-width="1.5"/>
        <rect x="760" y="68" width="170" height="28" rx="10" fill="rgba(255,255,255,0.1)"/>
        <rect x="776" y="80" width="20" height="14" rx="3" fill="rgba(255,255,255,0.18)"/>
        <rect x="806" y="80" width="20" height="14" rx="3" fill="rgba(255,255,255,0.18)"/>
        <rect x="836" y="80" width="20" height="14" rx="3" fill="rgba(255,255,255,0.18)"/>
        <rect x="866" y="80" width="20" height="14" rx="3" fill="rgba(255,255,255,0.18)"/>
        <rect x="776" y="104" width="20" height="14" rx="3" fill="rgba(255,255,255,0.15)"/>
        <rect x="806" y="104" width="20" height="14" rx="3" fill="rgba(255,255,255,0.15)"/>
        <rect x="836" y="104" width="20" height="14" rx="3" fill="rgba(255,255,255,0.15)"/>
        <rect x="866" y="104" width="20" height="14" rx="3" fill="rgba(255,255,255,0.15)"/>
        <rect x="824" y="152" width="34" height="46" rx="3" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
        <text x="845" y="142" text-anchor="middle" dominant-baseline="central" class="map-label"
              font-family="DM Sans,sans-serif" font-size="12" fill="white" font-weight="600">📚 Library</text>
      </g>

      <!-- 3. SCIENCE & TECH BUILDING -->

let currentId = null;

// ── PAN & ZOOM ──
const wrap = document.getElementById('map-wrap');
const stage = document.getElementById('map-stage');
let scale = 1, tx = 0, ty = 0;
let dragging = false, startX = 0, startY = 0, startTx = 0, startTy = 0;

function applyTransform() {
  stage.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
}

function changeZoom(delta) {
  const rect = wrap.getBoundingClientRect();
  const cx = rect.width / 2, cy = rect.height / 2;
  const newScale = Math.min(3, Math.max(0.4, scale + delta));
  tx = cx - (cx - tx) * (newScale / scale);
  ty = cy - (cy - ty) * (newScale / scale);
  scale = newScale;
  applyTransform();
}

function resetView() {
  scale = 1; tx = 0; ty = 0;
  applyTransform();
}

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const delta = e.deltaY < 0 ? 0.12 : -0.12;
  const newScale = Math.min(3, Math.max(0.4, scale + delta));
  tx = mx - (mx - tx) * (newScale / scale);
  ty = my - (my - ty) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, { passive: false });

wrap.addEventListener('mousedown', e => {
  if (e.target.closest('.bld') || e.target.closest('#popup')) return;
  dragging = true;
  wrap.classList.add('dragging');
  startX = e.clientX; startY = e.clientY;
  startTx = tx; startTy = ty;
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx = startTx + (e.clientX - startX);
  ty = startTy + (e.clientY - startY);
  applyTransform();
});
document.addEventListener('mouseup', () => { dragging = false; wrap.classList.remove('dragging'); });

// Touch support
let lastTouchDist = null;
wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true;
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    startTx = tx; startTy = ty;
  }
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                                e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });
wrap.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && dragging) {
    tx = startTx + (e.touches[0].clientX - startX);
    ty = startTy + (e.touches[0].clientY - startY);
    applyTransform();
  }
  if (e.touches.length === 2 && lastTouchDist) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                             e.touches[0].clientY - e.touches[1].clientY);
    const delta = (dist - lastTouchDist) * 0.005;
    const rect = wrap.getBoundingClientRect();
    const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
    const my = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
    const newScale = Math.min(3, Math.max(0.4, scale + delta));
    tx = mx - (mx - tx) * (newScale / scale);
    ty = my - (my - ty) * (newScale / scale);
    scale = newScale;
    lastTouchDist = dist;
    applyTransform();
  }
  e.preventDefault();
}, { passive: false });
wrap.addEventListener('touchend', () => { dragging = false; lastTouchDist = null; });

// ── POPUP ──
function showPopup(event, id) {
  event.stopPropagation();
  currentId = id;
  const b = BUILDINGS[id];
  const popup = document.getElementById('popup');

  document.getElementById('p-icon').textContent = b.emoji;
  document.getElementById('p-icon').style.background = b.typeBg;
  document.getElementById('p-title').textContent = b.name;
  document.getElementById('p-type').textContent = b.type;
  document.getElementById('p-type').style.color = b.typeColor;
  document.getElementById('p-btn').style.background = b.typeColor;

  document.getElementById('p-meta').innerHTML = `
    <div class="popup-row">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="${b.typeColor}" stroke-width="1.5"><path d="M8 1v14M1 8h14"/></svg>
      <span>${b.floors} floors · Est. ${b.year}</span>
    </div>
    <div class="popup-row">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="${b.typeColor}" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
      <span>${Object.values(b.hours)[0]}</span>
    </div>
  `;
  document.getElementById('p-desc').textContent = b.about.substring(0, 120) + '…';

  // Position near building on screen
  const mapRect = wrap.getBoundingClientRect();
  const svgEl = document.getElementById('campus-svg');
  const bldEl = document.querySelector(`[data-id="${id}"]`);
  const bldRect = bldEl.getBoundingClientRect();

  let px = bldRect.left + bldRect.width / 2 - mapRect.left - 140;
  let py = bldRect.top - mapRect.top - 10;

  const popupH = 260;
  if (py < 10) py = bldRect.bottom - mapRect.top + 10;
  if (px < 10) px = 10;
  if (px + 280 > mapRect.width - 10) px = mapRect.width - 290;

  popup.style.left = px + 'px';
  popup.style.top = py + 'px';
  popup.classList.add('visible');
  popup.style.animation = 'none';
  popup.offsetHeight;
  popup.style.animation = '';
}

function closePopup() {
  document.getElementById('popup').classList.remove('visible');
}

wrap.addEventListener('click', e => {
  if (!e.target.closest('#popup') && !e.target.closest('.bld')) closePopup();
});
